<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Mebay Product Page</title>
        <link rel="stylesheet" href="css/style.css">    
    </head>
    <body>
        <header>
            <nav>
                <a href="#">mebay</a>
                <a href="#">Categories</a>
                <a href="#">Deals</a>
                <a href="#">Sell</a>

                <div class="nav-right">
                    <a href="#">👤</a>
                    <a href="#">🛒</a>
                </div>
            </nav>
        </header>

        <main class="product-layout">

            <div class="thumbnails">
                <img src="images/mermaid.jpg" alt="pretty mermaid barbie">
                <img src="images/mermaid.jpg" alt="pretty mermaid barbie">
                <img src="images/mermaid.jpg" alt="pretty mermaid barbie">
                <img src="images/mermaid.jpg" alt="pretty mermaid barbie">
            </div>

            <section class="main-image">
                <img src="images/mermaid.jpg" alt="pretty mermaid barbie">
            </section>

            <div class="product-info">

                <h1>Product Name</h1>

                <div class="seller">
                    <p>
                        Seller:
                        <a href="#">TasteMyNightmare</a>
                    </p>

                    <a href="#">99.8% Positive Feedback</a><br>
                    <a href="#">Seller's other items</a><br>
                    <a href="#">Contact seller</a>
                </div>

                <h2>$149.99</h2>
                <div class="condition">
                    Condition: New    
                </div>

                <a class="button buy" href="#">Buy Now</a>
                <a class="button cart" href="#">Add to Cart</a>
                <a class="button wish" href="#">Add to Wishlist</a>

            </div>

        </main>
    
    </body>
</html>
